<svg width="1920" height="780" viewBox="0 0 1920 780" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="780" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0E5F88"/>
      <stop offset="0.45" stop-color="#3BA9E8"/>
      <stop offset="1" stop-color="#F4A0B7"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.06"/>
    </linearGradient>
    <filter id="softShadow" x="-40" y="-40" width="2000" height="900" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.4" fill="#FFFFFF" opacity="0.18"/>
    </pattern>
  </defs>

  <!-- Background gradient -->
  <rect width="1920" height="780" fill="url(#bg)"/>

  <!-- Subtle dot texture -->
  <rect width="1920" height="780" fill="url(#dots)" opacity="0.7"/>

  <!-- Glass cards -->
  <g filter="url(#softShadow)">
    <rect x="190" y="210" width="520" height="360" rx="28" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.22"/>
    <rect x="760" y="170" width="520" height="400" rx="28" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.22"/>
    <rect x="1330" y="230" width="400" height="320" rx="28" fill="url(#glass)" stroke="#FFFFFF" stroke-opacity="0.22"/>
  </g>

  <!-- Minimal icon marks -->
  <g opacity="0.85">
    <rect x="260" y="290" width="92" height="92" rx="18" fill="#FFFFFF" fill-opacity="0.9"/>
    <path d="M286 352V320" stroke="#0E5F88" stroke-width="10" stroke-linecap="round"/>
    <path d="M312 352V308" stroke="#0E5F88" stroke-width="10" stroke-linecap="round"/>
    <path d="M338 352V332" stroke="#0E5F88" stroke-width="10" stroke-linecap="round"/>
  </g>

  <g opacity="0.85">
    <rect x="830" y="270" width="92" height="92" rx="18" fill="#FFFFFF" fill-opacity="0.9"/>
    <path d="M856 348H900" stroke="#0E5F88" stroke-width="10" stroke-linecap="round"/>
    <path d="M856 322H900" stroke="#0E5F88" stroke-width="10" stroke-linecap="round"/>
    <path d="M856 296H884" stroke="#0E5F88" stroke-width="10" stroke-linecap="round"/>
  </g>

  <g opacity="0.85">
    <rect x="1400" y="300" width="92" height="92" rx="18" fill="#FFFFFF" fill-opacity="0.9"/>
    <path d="M1426 350L1442 334L1462 356" stroke="#0E5F88" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M1426 318H1470" stroke="#0E5F88" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <g>
    <text x="190" y="150" font-family="Montserrat, Arial, sans-serif" font-size="74" font-weight="800" letter-spacing="2" fill="#FFFFFF">
      INFOGRAPHICS
    </text>
    <text x="190" y="205" font-family="Montserrat, Arial, sans-serif" font-size="28" font-weight="600" fill="#FFFFFF" opacity="0.9">
      Current Affairs visual summaries
    </text>
  </g>
</svg>
